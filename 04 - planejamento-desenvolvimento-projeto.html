<script>
/* ---- Armazenamento persistente via Supabase (substitui window.storage) ---- */
(function(){
  var SUPABASE_URL = 'https://fiarntunpqteopwjkhjg.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_RO-UPexCYhZ0rVZiIYWunA_a7YqodnQ';
  var TABLE = 'kv_store';
  var base = SUPABASE_URL + '/rest/v1/' + TABLE;
  function headers(extra){
    var h = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY, 'Content-Type': 'application/json' };
    if (extra) { for (var k in extra) h[k] = extra[k]; }
    return h;
  }
  window.storage = {
    get: async function(key){
      var r = await fetch(base + '?key=eq.' + encodeURIComponent(key) + '&select=value', { headers: headers() });
      if(!r.ok) return null;
      var rows = await r.json();
      return rows.length ? { value: rows[0].value } : null;
    },
    set: async function(key, value){
      var r = await fetch(base + '?on_conflict=key', { method: 'POST', headers: headers({ 'Prefer': 'resolution=merge-duplicates' }), body: JSON.stringify({ key: key, value: value, updated_at: new Date().toISOString() }) });
      return r.ok;
    },
    delete: async function(key){
      var r = await fetch(base + '?key=eq.' + encodeURIComponent(key), { method: 'DELETE', headers: headers() });
      return r.ok;
    },
    list: async function(prefix){
      var r = await fetch(base + '?key=like.' + encodeURIComponent(prefix) + '*&select=key', { headers: headers() });
      if(!r.ok) return { keys: [] };
      var rows = await r.json();
      return { keys: rows.map(function(x){ return x.key; }) };
    },
  };
})();
</script>

    {kind:'field', key:'conclusao', label:'Conclusão e recomendação', type:'textarea'},
    {kind:'field', key:'viaAnexos', label:'Anexos', type:'textarea'},
  ]},
  {id:'crono', tab:'3 · Cronograma', title:'Cronograma', sub:'Marcos e prazos', blocks:[
    {kind:'table', key:'cronograma', label:'Marcos do projeto', seed:3, cols:[
      {key:'marco',label:'Marco do projeto',type:'text'},
      {key:'resp',label:'Responsável',type:'text'},
      {key:'duracao',label:'Duração',type:'text'},
      {key:'entrega',label:'Data de entrega',type:'date'},
    ]},
  ]},
  {id:'entradas', tab:'4 · Entradas', title:'Entradas do projeto', sub:'Requisitos e fontes', blocks:[
    {kind:'table', key:'entradas', label:'Entradas', cols:[
      {key:'id',label:'ID',type:'text'},
      {key:'categoria',label:'Categoria de entrada',type:'text'},
      {key:'descricao',label:'Descrição detalhada',type:'text'},
      {key:'fonte',label:'Fonte / documento de origem',type:'text'},
      {key:'resp',label:'Responsável',type:'text'},
      {key:'status',label:'Status',type:'select',options:ST_ENTRADA},
    ], seedRows:[
      {id:'E1',categoria:'Requisitos Funcionais',status:'Pendente'},
      {id:'E2',categoria:'Requisitos de Desempenho',status:'Pendente'},
      {id:'E3',categoria:'Requisitos Legais/Regulatórios',status:'Pendente'},
      {id:'E4',categoria:'Normas/Códigos de Prática',status:'Pendente'},
      {id:'E5',categoria:'Consequências de Falhas',status:'Pendente'},
      {id:'E6',categoria:'Informações de Projetos Anteriores',status:'Pendente'},
      {id:'E7',categoria:'Recursos e Infraestrutura',status:'Pendente'},
    ]},
  ]},
  {id:'saidas', tab:'5 · Saídas', title:'Saídas do projeto', sub:'Entregáveis e aceitação', blocks:[
    {kind:'table', key:'saidas', label:'Saídas', cols:[
      {key:'id',label:'ID',type:'text'},
      {key:'item',label:'Item de saída (entregável)',type:'text'},
      {key:'requisito',label:'Requisito de entrada (fonte da demanda)',type:'text'},
      {key:'criterios',label:'Critérios de aceitação',type:'text'},
      {key:'statusVerif',label:'Status de verificação',type:'select',options:ST_SAIDA_VERIF},
      {key:'aprovacao',label:'Aprovação final',type:'select',options:ST_APROV},
    ], seedRows:[{id:'S1'},{id:'S2'},{id:'S3'},{id:'S4'},{id:'S5'},{id:'S6'},{id:'S7'}]},
  ]},
  {id:'verif', tab:'6 · Verificação', title:'Verificação do projeto', sub:'Conformidade das saídas', blocks:[
    {kind:'table', key:'verificacao', label:'Verificação', cols:[
      {key:'id',label:'ID',type:'text'},
      {key:'requisito',label:'Requisito de entrada',type:'text'},
      {key:'saida',label:'Item de saída correspondente',type:'text'},
      {key:'metodo',label:'Método de verificação',type:'text'},
      {key:'resultado',label:'Resultado (C/NC)',type:'select',options:RES_CNC},
      {key:'evidencia',label:'Evidência documental',type:'text'},
      {key:'resp',label:'Responsável',type:'text'},
    ], seedRows:[{id:'VR1'},{id:'VR2'},{id:'VR3'},{id:'VR4'},{id:'VR5'},{id:'VR6'},{id:'VR7'}]},
  ]},
  {id:'valid', tab:'7 · Validação', title:'Validação do projeto', sub:'Uso pretendido', blocks:[
    {kind:'table', key:'validacao', label:'Validação', cols:[
      {key:'id',label:'ID',type:'text'},
      {key:'requisito',label:'Requisito do usuário / uso pretendido',type:'text'},
      {key:'metodo',label:'Método de validação (teste prático)',type:'text'},
      {key:'criterio',label:'Critério de sucesso',type:'text'},
      {key:'resultado',label:'Resultado',type:'select',options:RES_AV},
      {key:'evidencia',label:'Evidência (relatório/foto/vídeo)',type:'text'},
    ], seedRows:[{id:'V1'},{id:'V2'},{id:'V3'},{id:'V4'},{id:'V5'},{id:'V6'},{id:'V7'}]},
  ]},
  {id:'analise', tab:'8 · Análise crítica', title:'Análise crítica do projeto', sub:'Pontos de controle', blocks:[
    {kind:'table', key:'analise', label:'Análise crítica', cols:[
      {key:'etapa',label:'Etapa do projeto',type:'text'},
      {key:'dataAnalise',label:'Data da análise',type:'date'},
      {key:'participantes',label:'Participantes (áreas)',type:'text'},
      {key:'pontos',label:'Pontos analisados (status)',type:'text'},
      {key:'problemas',label:'Problemas/riscos identificados',type:'text'},
      {key:'acoes',label:'Ações necessárias / decisões',type:'text'},
      {key:'respPrazo',label:'Responsável e prazo',type:'text'},
    ], seedRows:[{etapa:'Planejamento'},{etapa:'Pós-verificação'},{etapa:'Pós-validação'},{etapa:'Finalização'}]},
  ]},
];

/* derive flat keys */
const FIELD_KEYS=[]; const TABLE_DEFS={};
IDFIELDS.forEach(f=>FIELD_KEYS.push(f.key));
STAGES.forEach(s=>s.blocks.forEach(b=>{ if(b.kind==='field') FIELD_KEYS.push(b.key); else { TABLE_DEFS[b.key]=b; } }));
const REQUIRED=IDFIELDS.filter(f=>f.req).map(f=>f.key);

/* ---------- helpers ---------- */
function toast(msg, ok=true){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.classList.toggle('ok', ok); t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3200);
}
function fmtDate(iso){ if(!iso) return '—'; const p=String(iso).split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso; }
function fmtStamp(ms){ const dt=new Date(ms); return dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }
function badgeClass(s){ if(s==='Concluído') return 'b-apr'; if(s==='Cancelado') return 'b-rep'; return 'b-pend'; }
function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ---------- build form ---------- */
function fieldHTML(f){
  const req=f.req?'<span class="req">*</span>':'';
  const hint=f.hint?`<div class="hint">${f.hint}</div>`:'';
  let ctrl;
  if(f.type==='textarea') ctrl=`<textarea id="${f.key}"></textarea>`;
  else if(f.type==='select'){
    ctrl=`<select id="${f.key}"><option value="">Selecione…</option>${(f.options||[]).map(o=>`<option>${o}</option>`).join('')}</select>`;
  } else ctrl=`<input id="${f.key}" type="${f.type==='date'?'date':'text'}">`;
  return `<div class="field ${f.full!==false?'full':''}" data-for="${f.key}">
    <label>${f.label}${req}</label>${hint}${ctrl}
    <div class="err-msg">Campo obrigatório.</div></div>`;
}

function buildIdGrid(){
  document.getElementById('id-grid').innerHTML=IDFIELDS.map(f=>fieldHTML({...f, full:f.full===true})).join('');
}

function buildStages(){
  const bar=document.getElementById('stage-bar');
  const panels=document.getElementById('stage-panels');
  bar.innerHTML=STAGES.map((s,i)=>`<button class="stage-btn" aria-selected="${i===0}" onclick="showStage('${s.id}')">${s.tab}</button>`).join('');
  panels.innerHTML=STAGES.map((s,i)=>{
    let inner='';
    // group consecutive field blocks into grids; tables stand alone
    let buffer=[];
    const flush=()=>{ if(buffer.length){ inner+=`<div class="grid">${buffer.map(fieldHTML).join('')}</div>`; buffer=[]; } };
    s.blocks.forEach(b=>{
      if(b.kind==='field'){ buffer.push({...b, full:true}); }
      else { flush(); inner+=`<div class="dyn" id="dyn-${b.key}"><label class="blocklabel">${b.label}</label></div>`; }
    });
    flush();
    return `<div class="stage-panel ${i===0?'active':''}" id="stage-${s.id}">
      <div class="card">
        <div class="section-h"><div class="n">${i+1}</div><h2>${s.title}</h2><p>${s.sub}</p></div>
        ${inner}
      </div></div>`;
  }).join('');
  // mount tables
  Object.values(TABLE_DEFS).forEach(t=>mountTable(t));
}

function showStage(id){
  STAGES.forEach(s=>{ document.getElementById('stage-'+s.id).classList.toggle('active', s.id===id); });
  document.querySelectorAll('.stage-btn').forEach((b,i)=>b.setAttribute('aria-selected', STAGES[i].id===id));
}

/* ---------- dynamic tables ---------- */
function mountTable(t){
  const host=document.getElementById('dyn-'+t.key);
  const wrap=document.createElement('div');
  wrap.innerHTML=`<div class="dyn-table-wrap"><table class="dyn-t" id="tbl-${t.key}">
    <thead><tr>${t.cols.map(c=>`<th>${c.label}</th>`).join('')}<th style="width:36px"></th></tr></thead><tbody></tbody></table></div>
    <div class="dyn-foot"><button type="button" class="btn btn-ghost btn-sm" onclick="addRow('${t.key}')">+ Adicionar linha</button></div>`;
  host.appendChild(wrap);
  if(t.seedRows) t.seedRows.forEach(r=>addRow(t.key, r));
  else { const n=t.seed||1; for(let i=0;i<n;i++) addRow(t.key); }
}
function cellInput(c, v){
  if(c.type==='select'){
    return `<select data-k="${c.key}"><option value="">—</option>${c.options.map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;
  }
  const t=c.type==='date'?'date':'text';
  return `<input data-k="${c.key}" type="${t}" value="${esc(v)}">`;
}
function addRow(key, vals){
  const t=TABLE_DEFS[key];
  const tb=document.querySelector(`#tbl-${key} tbody`);
  const tr=document.createElement('tr');
  let cells=t.cols.map(c=>`<td>${cellInput(c, vals?(vals[c.key]||''):'')}</td>`).join('');
  cells+=`<td><button type="button" class="row-x" title="Remover" onclick="this.closest('tr').remove()">×</button></td>`;
  tr.innerHTML=cells; tb.appendChild(tr);
}
function readTable(key){
  const rows=[];
  document.querySelectorAll(`#tbl-${key} tbody tr`).forEach(tr=>{
    const obj={}; let any=false;
    tr.querySelectorAll('input,select').forEach(inp=>{ const val=(inp.value||'').trim(); obj[inp.dataset.k]=val; if(val) any=true; });
    if(any) rows.push(obj);
  });
  return rows;
}
function roTable(key, rows){
  const t=TABLE_DEFS[key];
  if(!rows||!rows.length) return '<dd>—</dd>';
  let h='<dd><div class="ro-wrap"><table class="ro-t"><thead><tr>'+t.cols.map(c=>`<th>${c.label}</th>`).join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{ h+='<tr>'+t.cols.map(c=>{let v=r[c.key]||''; if(c.type==='date'&&v) v=fmtDate(v); return `<td>${esc(v||'—')}</td>`;}).join('')+'</tr>'; });
  h+='</tbody></table></div></dd>'; return h;
}

/* ---------- views ---------- */
function showView(v){
  document.getElementById('view-new').style.display=v==='new'?'block':'none';
  document.getElementById('view-list').style.display=v==='list'?'block':'none';
  document.getElementById('tab-new').setAttribute('aria-selected', v==='new');
  document.getElementById('tab-list').setAttribute('aria-selected', v==='list');
  if(v==='list') renderList();
}

async function loadAll(){
  cache=[];
  try{
    const res=await window.storage.list(KEY_PREFIX);
    const keys=(res&&res.keys)?res.keys:[];
    for(const k of keys){ try{ const r=await window.storage.get(k); if(r&&r.value) cache.push(JSON.parse(r.value)); }catch(e){} }
  }catch(e){ console.warn('list failed',e); }
  cache.sort((a,b)=>b.createdAt-a.createdAt);
  document.getElementById('count').textContent=cache.length;
}
async function nextProtocol(){
  const year=new Date().getFullYear();
  const seq=String(cache.length+1).padStart(3,'0');
  return `FORALF00325-${year}-${seq}`;
}

function clearError(id){ const f=document.querySelector(`.field[data-for="${id}"]`); if(f) f.classList.remove('error'); }
function validate(){
  let firstBad=null;
  REQUIRED.forEach(id=>{
    const el=document.getElementById(id);
    const f=document.querySelector(`.field[data-for="${id}"]`);
    if(!el.value.trim()){ f.classList.add('error'); if(!firstBad) firstBad=f; } else f.classList.remove('error');
  });
  if(firstBad) firstBad.scrollIntoView({behavior:'smooth',block:'center'});
  return !firstBad;
}

async function submitForm(){
  if(!validate()){ toast('Revise os campos obrigatórios da identificação', false); return; }
  let rec;
  if(editId){
    rec = Object.assign({}, cache.find(x=>x.id===editId));
  } else {
    rec = { id:'p_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), protocolo: await nextProtocol(), status:'Em planejamento', createdAt:Date.now() };
  }
  FIELD_KEYS.forEach(id=>{ const el=document.getElementById(id); if(el) rec[id]=(el.value||'').trim(); });
  Object.keys(TABLE_DEFS).forEach(k=>{ rec[k]=readTable(k); });
  try{
    const r=await window.storage.set(KEY_PREFIX+rec.id, JSON.stringify(rec));
    if(!r) throw new Error('no result');
    if(editId){
      const idx=cache.findIndex(x=>x.id===rec.id);
      if(idx>-1) cache[idx]=rec; else cache.unshift(rec);
      toast('Dossiê '+rec.protocolo+' atualizado');
    } else {
      cache.unshift(rec);
      toast('Dossiê '+rec.protocolo+' registrado');
    }
    document.getElementById('count').textContent=cache.length;
    editId=null;
    clearForm(); showView('list');
  }catch(e){ console.error(e); toast('Não foi possível salvar. Tente novamente.', false); }
}
function editCurrent(){
  const r=cache.find(x=>x.id===currentId); if(!r) return;
  editId=r.id;
  FIELD_KEYS.forEach(id=>{ const el=document.getElementById(id); if(el) el.value = r[id]||''; });
  Object.values(TABLE_DEFS).forEach(t=>{
    document.querySelector(`#tbl-${t.key} tbody`).innerHTML='';
    const rows=r[t.key]||[];
    if(rows.length){ rows.forEach(row=>addRow(t.key,row)); }
    else if(t.seedRows){ t.seedRows.forEach(sr=>addRow(t.key,sr)); }
    else { const n=t.seed||1; for(let i=0;i<n;i++) addRow(t.key); }
  });
  document.querySelectorAll('.field.error').forEach(f=>f.classList.remove('error'));
  closeDrawer();
  showView('new');
  showStage(STAGES[0].id);
  updateEditBanner();
}
function updateEditBanner(){
  document.getElementById('submitBtn').textContent = editId ? 'Salvar alterações' : 'Registrar dossiê';
}
function clearForm(){
  FIELD_KEYS.forEach(id=>{const el=document.getElementById(id); if(el) el.value='';});
  Object.values(TABLE_DEFS).forEach(t=>{ document.querySelector(`#tbl-${t.key} tbody`).innerHTML=''; if(t.seedRows) t.seedRows.forEach(r=>addRow(t.key,r)); else { const n=t.seed||1; for(let i=0;i<n;i++) addRow(t.key); } });
  document.querySelectorAll('.field.error').forEach(f=>f.classList.remove('error'));
  showStage(STAGES[0].id);
  editId=null;
  updateEditBanner();
}

function renderList(){
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  const rows=cache.filter(r=>!q || ((r.nomeProjeto||'')+(r.gestor||'')+(r.unidade||'')+r.protocolo).toLowerCase().includes(q));
  const body=document.getElementById('list-body');
  if(!cache.length){
    body.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4zM4 9h16M9 9v11"/></svg><h3>Nenhum dossiê cadastrado</h3><p>Os projetos planejados aparecem aqui.</p></div>`; return;
  }
  if(!rows.length){ body.innerHTML=`<div class="empty"><h3>Nenhum resultado</h3><p>Ajuste a busca.</p></div>`; return; }
  let html=`<table class="list"><thead><tr><th>Protocolo</th><th>Projeto</th><th class="hide-sm">Unidade</th><th class="hide-sm">Elaboração</th><th>Status</th></tr></thead><tbody>`;
  for(const r of rows){
    html+=`<tr onclick="openDrawer('${r.id}')">
      <td><div class="proto">${esc(r.protocolo)}<small>${fmtStamp(r.createdAt)}</small></div></td>
      <td><div class="proj">${esc(r.nomeProjeto)}<small>Gestor: ${esc(r.gestor)}</small></div></td>
      <td class="hide-sm">${esc(r.unidade)}</td>
      <td class="hide-sm">${fmtDate(r.data)}</td>
      <td><span class="badge ${badgeClass(r.status)}">${esc(r.status)}</span></td>
    </tr>`;
  }
  html+='</tbody></table>'; body.innerHTML=html;
}

function openDrawer(id){
  const r=cache.find(x=>x.id===id); if(!r) return; currentId=id;
  document.getElementById('d-proj').textContent=r.nomeProjeto;
  document.getElementById('d-proto').textContent=r.protocolo+' · elaborado em '+fmtDate(r.data);
  document.getElementById('d-status').value=r.status;
  let html='<div class="grp">Identificação</div>';
  IDFIELDS.filter(f=>f.key!=='nomeProjeto').forEach(f=>{
    let v=r[f.key]; if(f.type==='date') v=fmtDate(v);
    html+=`<div class="row"><dt>${f.label}</dt><dd>${esc(v||'—')}</dd></div>`;
  });
  STAGES.forEach(s=>{
    html+=`<div class="grp">${s.title}</div>`;
    s.blocks.forEach(b=>{
      if(b.kind==='field'){ html+=`<div class="row"><dt>${b.label}</dt><dd>${esc(r[b.key]||'—')}</dd></div>`; }
      else { html+=`<div class="row"><dt>${b.label}</dt>${roTable(b.key, r[b.key])}</div>`; }
    });
  });
  document.getElementById('d-body').innerHTML=html;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('drawer').classList.add('show');
}
function closeDrawer(){ document.getElementById('overlay').classList.remove('show'); document.getElementById('drawer').classList.remove('show'); currentId=null; }
async function changeStatus(){
  const r=cache.find(x=>x.id===currentId); if(!r) return;
  r.status=document.getElementById('d-status').value;
  try{ await window.storage.set(KEY_PREFIX+r.id, JSON.stringify(r)); renderList(); toast('Status atualizado para "'+r.status+'"'); }
  catch(e){ toast('Não foi possível atualizar o status', false); }
}
async function deleteCurrent(){
  const r=cache.find(x=>x.id===currentId); if(!r) return;
  if(!confirm('Excluir o dossiê '+r.protocolo+'? Esta ação não pode ser desfeita.')) return;
  try{ await window.storage.delete(KEY_PREFIX+r.id); cache=cache.filter(x=>x.id!==currentId); document.getElementById('count').textContent=cache.length; closeDrawer(); renderList(); toast('Dossiê excluído'); }
  catch(e){ toast('Não foi possível excluir', false); }
}

function tableToText(key, rows){
  if(!rows||!rows.length) return '';
  const t=TABLE_DEFS[key];
  return rows.map(r=>t.cols.map(c=>{let v=r[c.key]||''; if(c.type==='date'&&v) v=fmtDate(v); return c.label+': '+v;}).join(' | ')).join('\n');
}
function exportCSV(){
  if(!cache.length){ toast('Não há dossiês para exportar', false); return; }
  const simpleCols=[['protocolo','Protocolo'],['status','Status']].concat(FIELD_KEYS.map(k=>[k,k]));
  const tableKeys=Object.keys(TABLE_DEFS);
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  let header=simpleCols.map(c=>q(c[1])).concat(tableKeys.map(k=>q(TABLE_DEFS[k].label)));
  let csv=header.join(';')+'\r\n';
  for(const r of cache){
    const row={...r, data:fmtDate(r.data)};
    let line=simpleCols.map(c=>q(row[c[0]]));
    line=line.concat(tableKeys.map(k=>q(tableToText(k, r[k]))));
    csv+=line.join(';')+'\r\n';
  }
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='planejamento_FORALF00325.csv'; a.click(); URL.revokeObjectURL(url);
  toast('CSV exportado ('+cache.length+' dossiês)');
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

/* ---------- init ---------- */
buildIdGrid();
buildStages();
REQUIRED.forEach(id=>{ const el=document.getElementById(id); if(el) el.addEventListener('input',()=>clearError(id)); });
(async()=>{ await loadAll(); renderList(); })();
</script>
